name: osixia
on: [push, pull_request]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false
      - name: golangci-lint build
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: build

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, shellcheck]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Vendor build go dependencies
        run: cd build && go mod vendor
      - name: Run pipeline
        run: cd build && go run main.go github ../Dockerfile ../CHANGELOG.md "${GITHUB_REF}" "${{ secrets.GITHUB_TOKEN }}" --username "${{ secrets.REGISTRY_USERNAME }}" --password "${{ secrets.REGISTRY_PASSWORD }}" ${{ vars.OSX_GITHUB_FLAGS }}
